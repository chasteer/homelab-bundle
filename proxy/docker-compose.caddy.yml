services:
  caddy:
    image: caddy:2
    container_name: caddy
    networks: [homelab]
    ports:
      - "${HOMELAB_HOST:-127.0.0.1}:443:443"
      - "${HOMELAB_HOST:-127.0.0.1}:80:80"
    env_file:
      - ../services/.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

networks:
  homelab:
    external: true

volumes:
  caddy-data:
  caddy-config:
