# Cursor CLI (`agent`) устанавливается в образ при сборке (cursor.com/install)

name: homelab-agent

services:
  agent:
    build: .
    container_name: homelab-agent
    restart: unless-stopped
    ports:
      - "${HOMELAB_HOST:-your_local_ip}:8000:8000"
    environment:
      - TZ=${TZ:-UTC}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - AGENT_DB=postgresql://agent:${AGENT_DB_PASSWORD}@agent-db:5432/homelab_agent
      - RAG_DB_DIR=/app/data/index
      - HOMELAB_HOST=${HOMELAB_HOST:-localhost}
      - UPTIME_KUMA_URL=${UPTIME_KUMA_URL:-http://uptime-kuma:3001}
      - UPTIME_KUMA_API=${UPTIME_KUMA_API:-}
      - AGENT_WEBHOOK_URL=${AGENT_WEBHOOK_URL:-http://localhost:8000/api/webhook/uptime-kuma}
      - VPS_WEBHOOK_URL=${VPS_WEBHOOK_URL:-https://your_vps_domain.com/uptime-alerts}
      - VPS_FORCE_IPV4=${VPS_FORCE_IPV4:-true}
      - VPS_CONNECT_TIMEOUT=${VPS_CONNECT_TIMEOUT:-15}
      - VPS_READ_TIMEOUT=${VPS_READ_TIMEOUT:-90}
      - CURSOR_API_KEY=${CURSOR_API_KEY:-}
      - CURSOR_CLI_PATH=${CURSOR_CLI_PATH:-/home/agent/.local/bin/agent}
      - CURSOR_WORKSPACE=${CURSOR_WORKSPACE:-/app/homelab}
      - CURSOR_AGENT_MODEL=${CURSOR_AGENT_MODEL:-}
      - CURSOR_AGENT_MODE=${CURSOR_AGENT_MODE:-ask}
      - CURSOR_TELEGRAM_MAX_CHARS=${CURSOR_TELEGRAM_MAX_CHARS:-1400}
      - CURSOR_OUTPUT_FORMAT=${CURSOR_OUTPUT_FORMAT:-json}
      - CURSOR_CLI_TIMEOUT=${CURSOR_CLI_TIMEOUT:-300}
      - CURSOR_INCIDENT_ENABLED=${CURSOR_INCIDENT_ENABLED:-true}
      - CURSOR_INCIDENT_REQUIRED=${CURSOR_INCIDENT_REQUIRED:-true}
      - CURSOR_INCIDENTS_DIR=/app/logs/incidents
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ..:/app/homelab:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv:/srv:ro
    networks:
      - homelab
    depends_on:
      - agent-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agent-db:
    image: postgres:15-alpine
    container_name: homelab-agent-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=homelab_agent
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=${AGENT_DB_PASSWORD:?Задайте AGENT_DB_PASSWORD в .env}
      - TZ=${TZ:-UTC}
    volumes:
      - agent-db-data:/var/lib/postgresql/data
    networks:
      - homelab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d homelab_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  github-polling:
    build: .
    container_name: homelab-github-polling
    restart: unless-stopped
    command: python /app/github_polling.py
    environment:
      - TZ=${TZ:-UTC}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - POLLING_INTERVAL=${POLLING_INTERVAL:-300}
      - AGENT_URL=http://agent:8000
    volumes:
      - ./github-config:/app/github-config
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homelab
    depends_on:
      - agent
    profiles:
      - polling

networks:
  homelab:
    external: true

volumes:
  agent-db-data:

